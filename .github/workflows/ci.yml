name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  FOUNDRY_PROFILE: ci

jobs:
  # ── Python: lint + typecheck ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: ruff check
        run: ruff check neutron/ --output-format=github

      - name: black check
        run: black --check neutron/

      - name: mypy
        run: mypy neutron/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  # ── Python: unit tests ───────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: neutron
          POSTGRES_PASSWORD: neutron
          POSTGRES_DB: neutron_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://neutron:neutron@localhost:5432/neutron_test
      TEMPORAL_HOST: localhost:7233
      NATS_URL: nats://localhost:4222
      NEXUS_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/integration \
            --ignore=tests/e2e \
            -x \
            --tb=short \
            --cov=neutron \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Solidity: forge build + test ─────────────────────────────────────────
  test-contracts:
    name: Solidity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        working-directory: contracts
        run: forge install

      - name: Build contracts
        working-directory: contracts
        run: forge build --sizes

      - name: Run tests
        working-directory: contracts
        run: |
          forge test \
            --gas-report \
            --fuzz-runs 256 \
            -v

      - name: Check contract sizes
        working-directory: contracts
        run: forge build --sizes 2>&1 | grep -E "(Contract|Size)" || true

  # ── Nix flake check ──────────────────────────────────────────────────────
  nix-check:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix flake check
        run: nix flake check --no-build

  # ── Secret scan ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Summary gate ─────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-contracts, nix-check]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed" && exit 1
          fi
          if [[ "${{ needs.test-python.result }}" != "success" ]]; then
            echo "test-python failed" && exit 1
          fi
          if [[ "${{ needs.test-contracts.result }}" != "success" ]]; then
            echo "test-contracts failed" && exit 1
          fi
          if [[ "${{ needs.nix-check.result }}" != "success" ]]; then
            echo "nix-check failed" && exit 1
          fi
          echo "All CI checks passed ✅"
