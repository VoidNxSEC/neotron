name: "Neutron Delivery Substrate"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  NIX_CONFIG: "experimental-features = nix-command flakes"
  UV_SYSTEM_PYTHON: 1

jobs:
  # ------------------------------------------------------------------
  # GATE 1: Security Audit (Blocking)
  # ------------------------------------------------------------------
  security-audit:
    name: "🛡️ Security-as-Code Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Run Trivy Vulnerability Scanner"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: "Audit Nix Flake Inputs"
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - run: nix flake check

  # ------------------------------------------------------------------
  # GATE 2: Build & Unit Verification
  # ------------------------------------------------------------------
  build-and-verify:
    name: "🏗️ Build & Verify Substrate"
    needs: [security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install Nix"
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: "Magic Nix Cache"
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: "Install uv"
        uses: astral-sh/setup-uv@v1

      - name: "Hydrate Dev Environment"
        run: |
          nix develop --command echo "Nix shell hydrated"
          nix develop --command uv sync --frozen

      - name: "Static Analysis (Lint & Typecheck)"
        # Continue on error for lint to allow manual review, but fail if critical
        run: |
          nix develop --command just lint || echo "Lint warnings detected"
          nix develop --command just typecheck

      - name: "Unit Testing (Isolated)"
        run: |
          nix develop --command just test

  # ------------------------------------------------------------------
  # GATE 3: Ephemeral Integration Substrate
  # ------------------------------------------------------------------
  ephemeral-integration:
    name: "🧪 Ephemeral Integration"
    needs: [build-and-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Provision Ephemeral Infrastructure"
        run: |
          docker compose up -d postgres temporal mlflow
          # Wait for healthchecks could be added here
          sleep 10

      - name: "Install Nix"
        uses: cachix/install-nix-action@v25

      - name: "Install uv"
        uses: astral-sh/setup-uv@v1

      - name: "Run Integration Suite"
        run: |
          nix develop --command uv sync --frozen
          nix develop --command just test-all
        env:
          TEMPORAL_ADDRESS: localhost:7233
          MLFLOW_TRACKING_URI: http://localhost:5000

      - name: "Teardown Substrate"
        if: always()
        run: docker compose down -v
