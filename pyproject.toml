[tool.poetry]
name = "neutron-ml-pipeline"
version = "0.1.0"
description = "Adaptive ML Pipeline - Temporal + Ray + MLflow orchestration"
authors = ["kernelcore <kernelcore@neutron.ai>"]
readme = "README.md"
packages = [{include = "*.py"}]

[tool.poetry.dependencies]
python = "^3.13"

# Core Orchestration
temporalio = "1.5.1"
ray = {extras = ["default"], version = "2.9.0"}
mlflow = "2.10.2"

# ML/DL Stack - CRITICAL: Usar wheels pré-compilados do PyTorch
torch = {version = ">=2.0.0", source = "pytorch-cu121"}
torchvision = {version = ">=0.15.0", source = "pytorch-cu121"}
transformers = ">=4.36.0"
datasets = ">=2.16.0"
accelerate = ">=0.26.0"
sentencepiece = ">=0.1.99"
safetensors = ">=0.4.1"

# Scientific Computing
numpy = ">=1.24.0"
scipy = ">=1.11.0"
scikit-learn = ">=1.3.0"
pandas = ">=2.0.0"

# Data Validation
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"

# Database
psycopg2-binary = ">=2.9.9"
sqlalchemy = ">=2.0.0"

# Utilities
python-dotenv = ">=1.0.0"
tenacity = ">=8.2.3"
tqdm = ">=4.66.0"
click = ">=8.1.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.0"
pytest-asyncio = ">=0.21.0"
pytest-cov = ">=4.1.0"
black = ">=23.12.0"
ruff = ">=0.1.9"
mypy = ">=1.8.0"
ipython = "*"
jupyter = "*"

[tool.poetry.group.cerebro]
optional = true

[tool.poetry.group.cerebro.dependencies]
google-cloud-bigquery = ">=3.14.0"

# PyTorch wheel source para CUDA 12.1+ (compatível com CUDA 13.0)
[[tool.poetry.source]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
priority = "explicit"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py313']
exclude = '''
/(
    \.git
  | \.venv
  | \.mypy_cache
  | \.pytest_cache
  | __pycache__
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [".venv", ".git", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]
ignore = ["E501"]  # Line too long (handled by black)

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [".venv", "build", "dist"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short"
markers = [
    "integration: Integration tests (deselect with '-m \"not integration\"')",
    "benchmark: Benchmark tests (deselect with '-m \"not benchmark\"')",
]
