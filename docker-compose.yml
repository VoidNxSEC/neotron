# Neutron Compliance Platform Infrastructure
# Services: Temporal (compliance orchestration), PostgreSQL
# Note: MLflow moved to ml-offload-api/

services:
  # PostgreSQL - Backend para Temporal e compliance DB
  postgres:
    image: postgres:15-alpine
    container_name: neutron-postgres
    environment:
      POSTGRES_USER: neutron
      POSTGRES_PASSWORD: neutron
      POSTGRES_DB: neutron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U neutron" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neutron-network

  # Temporal Server - Compliance workflow orchestration
  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: neutron-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=neutron
      - POSTGRES_PWD=neutron
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233" # Temporal gRPC
      - "8088:8088" # Temporal UI
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: [ "CMD", "tctl", "cluster", "health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - neutron-network

  # MLflow has been moved to ml-offload-api/
  # See ml-offload-api docker-compose.yml for MLflow + Ray services

networks:
  neutron-network:
    driver: bridge

volumes:
  postgres_data:
