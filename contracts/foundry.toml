[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/"
]

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Gas reporting
gas_reports = ["*"]

# Test settings
fuzz_runs = 256

# Allow filesystem writes for deployment artifacts
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read-write", path = "./broadcast" }
]

# RPC endpoints
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
localhost = "http://localhost:8545"

# Etherscan verification
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
